<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blaue Karten – 33 Lernmethoden</title>
<style>
:root{
--bg:#0a1630; --bg2:#0b1d3d; --card:#0f2747; --card2:#123057;
--text:#e6f0ff; --muted:#b7c6e3; --ring:rgba(122,162,247,.28); --shadow:rgba(3,8,20,.55);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
color:var(--text);background:radial-gradient(1200px 400px at 20% -10%,#123a7a33,transparent 60%),
linear-gradient(180deg,var(--bg),var(--bg2));-webkit-font-smoothing:antialiased}
.container{max-width:1280px;margin:0 auto;padding:0 20px}
header{padding:48px 0 16px}
h1{margin:0 0 6px;font-size:clamp(24px,4vw,38px)}
.lead{margin:0;color:var(--muted);font-size:14px}

/* ── Controls ── */
.controls{position:sticky;top:0;z-index:20;
background:linear-gradient(180deg,#0b1730f0,#0b1730cc);
border-bottom:1px solid #ffffff12;backdrop-filter:blur(8px)}
.controls .wrap{padding:12px 0;display:flex;flex-direction:column;gap:10px}

.search-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search{position:relative;flex:1 1 220px}
.search input{width:100%;padding:9px 9px 9px 36px;border-radius:10px;
border:1px solid var(--ring);background:var(--card);color:var(--text);outline:none;font-size:13px}
.search .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.6;pointer-events:none;font-size:14px}

.filter-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;margin-right:2px}

.pill{border:1px solid var(--ring);background:var(--card);color:var(--text);
padding:6px 12px;border-radius:999px;cursor:pointer;font-weight:600;font-size:12px;
transition:background .15s,box-shadow .15s;white-space:nowrap}
.pill.active{background:var(--card2);box-shadow:0 0 0 2px rgba(122,162,247,.4)}
.pill:hover{background:var(--card2)}

.result-count{font-size:12px;color:var(--muted);padding:2px 0 6px}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:20px 0 60px}

/* ── Card flip ── */
.card{perspective:1200px;cursor:pointer}
.card-inner{position:relative;width:100%;height:290px;transform-style:preserve-3d;
transition:transform .55s cubic-bezier(.4,0,.2,1);border-radius:16px}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;padding:16px;display:flex;flex-direction:column;gap:8px;
backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;
border:1px solid var(--ring);box-shadow:0 14px 30px var(--shadow)}
.card-front{background:linear-gradient(160deg,var(--card),#0c1e3a)}
.card-back{transform:rotateY(180deg);background:linear-gradient(160deg,var(--card2),#0e2240)}

.top{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.num{font-weight:800;color:#9cc9ff;font-size:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;
border-radius:999px;font-weight:700;font-size:11px;color:#fff;white-space:nowrap}
.title{font-size:16px;font-weight:800}
.desc{color:var(--muted);font-size:13px;line-height:1.5;flex:1}
.howto{color:#deebff;font-size:13px;line-height:1.5;flex:1}

.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;border:1px solid;white-space:nowrap}

/* Schwierigkeit */
.tag-easy {color:#4ade80;border-color:#4ade8055;background:#4ade8011}
.tag-mid {color:#fbbf24;border-color:#fbbf2455;background:#fbbf2411}
.tag-hard {color:#f97316;border-color:#f9731655;background:#f9731611}
.tag-expert{color:#f87171;border-color:#f8717155;background:#f8717111}

/* Zeit */
.tag-time{color:#a78bfa;border-color:#a78bfa55;background:#a78bfa11}

/* Phase */
.tag-einstieg {color:#38bdf8;border-color:#38bdf855;background:#38bdf811}
.tag-erarbeitung{color:#34d399;border-color:#34d39955;background:#34d39911}
.tag-darstellung{color:#fb923c;border-color:#fb923c55;background:#fb923c11}
.tag-sicherung {color:#e879f9;border-color:#e879f955;background:#e879f911}

.flip-hint{font-size:10px;color:var(--muted);opacity:.4;text-align:right}
.hidden{display:none!important}
footer{border-top:1px solid #ffffff14;color:var(--muted);padding:20px 0 40px;font-size:12px}
</style>
</head>

</div>

h:'Schreibe für Unkundige. Nummeriere jeden Schritt. Teste die Anleitung: Kann jemand ohne Vorwissen damit arbeiten?'},
];

function buildCard(m) {
const cat = CATS[m.c];
const d = DIFF[m.diff];
const ti = TIME[m.time];
const phaseTags = m.phase.map(p => `<span class="tag ${PHASE[p].cls}">${PHASE[p].label}</span>`).join('');
return `<div class="card"
data-cat="${m.c}"
data-diff="${m.diff}"
data-time="${m.time}"
data-phase="${m.phase.join(',')}"
data-text="${(m.t+' '+m.d+' '+m.h).toLowerCase()}">
<div class="card-inner">
<div class="card-face card-front">
<div class="top">
<span class="num">#${m.n}</span>
<span class="badge" style="background:${cat.color}">${cat.label}</span>
</div>
<div class="title">${m.e} ${m.t}</div>
<div class="desc">${m.d}</div>
<div class="tags">
<span class="tag ${d.cls}">${d.label}</span>
<span class="tag ${ti.cls}">${ti.label}</span>
${phaseTags}
</div>
<div class="flip-hint">↩ umdrehen für Praxistipp</div>
</div>
<div class="card-face card-back">
<div class="top">
<span class="num">#${m.n}</span>
<span class="badge" style="background:${cat.color}">${cat.label}</span>
</div>
<div class="title">${m.e} Praxistipp</div>
<div class="howto">💡 ${m.h}</div>
<div class="tags">
<span class="tag ${d.cls}">${d.label}</span>
<span class="tag ${ti.cls}">${ti.label}</span>
${phaseTags}
</div>
<div class="flip-hint">↩ zurückdrehen</div>
</div>
</div>
</div>`;
}

function render() {
const grid = document.getElementById('grid');
grid.innerHTML = METHODS.map(buildCard).join('');
grid.querySelectorAll('.card').forEach(card => {
card.addEventListener('click', () => card.classList.toggle('flipped'));
});
}

const active = {cat:'all', diff:'all', time:'all', phase:'all'};

function apply() {
const q = document.getElementById('search').value.trim().toLowerCase();
let visible = 0;
document.querySelectorAll('.card').forEach(el => {
const okCat = active.cat === 'all' || el.dataset.cat === active.cat;
const okDiff = active.diff === 'all' || el.dataset.diff === active.diff;
const okTime = active.time === 'all' || el.dataset.time === active.time;
const okPhase = active.phase === 'all' || el.dataset.phase.split(',').includes(active.phase);
const okText = !q || el.dataset.text.includes(q);
const show = okCat && okDiff && okTime && okPhase && okText;
el.classList.toggle('hidden', !show);
if(show) visible++;
});
document.getElementById('count').textContent = `${visible} von 33 Methoden angezeigt`;
}

function setupControls() {
document.querySelectorAll('.pill').forEach(btn => {
btn.addEventListener('click', () => {
const group = btn.dataset.group;
document.querySelectorAll(`.pill[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
btn.classList.add('active');
active[group] = btn.dataset.val;
apply();
});
});
document.getElementById('search').addEventListener('input', apply);
}

document.addEventListener('DOMContentLoaded', () => { render(); setupControls(); apply(); });
</script> </body>
</html>
